services:
  redis:
    image: redis:7-alpine
    container_name: orderbook-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis-ui:
    image: rediscommander/redis-commander:latest
    container_name: orderbook-redis-ui
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "${REDIS_UI_PORT:-8081}:8081"
    depends_on:
      redis:
        condition: service_healthy

  streamer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orderbook-streamer
    env_file:
      - .env
    command: ["python", "main.py"]
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orderbook-backend
    env_file:
      - .env
    command: ["uvicorn", "backend.main:create_app", "--factory", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - arbitrage_data:/data
      - ./logs:/app/logs
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: orderbook-frontend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  redis_data:
  arbitrage_data:
